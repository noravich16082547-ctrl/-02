<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบพนักงาน | Taste Harmony</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5ZXP3TPVYF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5ZXP3TPVYF');
  </script>
</head>
<body style="background-color: var(--background);">

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 16px;">
          <i class="fa-solid fa-utensils"></i> Taste<span>Harmony</span>
        </a>
        <h2 style="font-size: 1.5rem; color: var(--secondary)">เข้าสู่ระบบหลังร้าน</h2>
        <p style="font-size: 0.85rem; color: var(--text-muted)">สำหรับผู้จัดการร้านและพนักงานบริการ</p>
      </div>

      <!-- Error message container -->
      <div class="auth-error" id="auth-error-box">
        <i class="fa-solid fa-circle-exclamation"></i> <span id="auth-error-msg">ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง</span>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="username"><i class="fa-solid fa-user"></i> ชื่อผู้ใช้งาน (Username)</label>
          <input type="text" id="username" required placeholder="กรอกชื่อผู้ใช้งาน" autofocus>
        </div>
        <div class="form-group" style="margin-bottom: 24px;">
          <label for="password"><i class="fa-solid fa-lock"></i> รหัสผ่าน (Password)</label>
          <input type="password" id="password" required placeholder="กรอกรหัสผ่าน">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 16px;">
          <i class="fa-solid fa-right-to-bracket"></i> เข้าสู่ระบบ
        </button>

        <a href="index.html" class="btn btn-outline" style="width: 100%">
          <i class="fa-solid fa-arrow-left"></i> กลับสู่หน้าแรก
        </a>
      </form>

      <div style="margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--text-muted); text-align: center; background-color: var(--background); border-radius: var(--radius-sm); padding: 12px;">
        <p style="font-weight: 600; margin-bottom: 4px; color: var(--secondary);"><i class="fa-solid fa-info-circle"></i> บัญชีทดสอบระบบ (Demo Account)</p>
        <p><strong>ผู้จัดการ:</strong> admin / adminpassword</p>
        <p><strong>พนักงาน:</strong> staff1 / password123</p>
      </div>
    </div>
  </div>

  <script src="db.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Check if already logged in, redirect to admin
      if (sessionStorage.getItem('loggedInStaff')) {
        window.location.href = 'admin.html';
        return;
      }

      const loginForm = document.getElementById('login-form');
      const errorBox = document.getElementById('auth-error-box');
      const errorMsg = document.getElementById('auth-error-msg');
      const DB = window.RestaurantDB;

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const usernameVal = document.getElementById('username').value.trim();
        const passwordVal = document.getElementById('password').value;

        // Hide previous error
        errorBox.style.display = 'none';

        try {
          // Authentication check
          const staff = await DB.loginStaff(usernameVal, passwordVal);
          
          if (staff) {
            // Save in session
            sessionStorage.setItem('loggedInStaff', JSON.stringify(staff));
            // Redirect to Admin panel
            window.location.href = 'admin.html';
          } else {
            // Display error
            errorMsg.textContent = 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
            errorBox.style.display = 'flex';
          }
        } catch(err) {
          console.error(err);
          errorMsg.textContent = 'เกิดข้อผิดพลาดจากระบบฐานข้อมูล';
          errorBox.style.display = 'flex';
        }
      });
    });
  </script>
</body>
</html>
